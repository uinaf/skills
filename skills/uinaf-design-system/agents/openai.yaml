interface:
  display_name: "uinaf design system"
  short_description: "Apply the uinaf brand identity to any uinaf output"
  default_prompt: |
    Use $uinaf-design-system.

    Goal: produce or restyle a uinaf-branded artifact that follows the brand system.

    Success criteria:
    - The output uses the correct uinaf voice, type, color, component, motion, and asset rules for the target surface.
    - Only the task-relevant brand references are loaded.
    - The result is checked against the hard rules before handoff.

    Constraints:
    - Skip this skill for non-uinaf work.
    - Do not treat this as a generic UI kit.
    - Do not vendor brand assets when CDN references are required.

    Output: name the surface, changed files or produced artifact, brand checks performed, gaps, and next step.

    Stop rules: ask or block when the surface, brand context, or required asset choice is ambiguous enough to change the result.
