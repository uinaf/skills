interface:
  display_name: "Release Pipeline"
  short_description: "Standardize GitHub Actions release flow"
  default_prompt: |
    Use $gh-release-pipeline.

    Goal: align this repo's GitHub Actions release flow around verify-then-release for versioned artifacts.

    Success criteria:
    - Verify is the publish gate on PRs and main.
    - Main-branch release analyzes conventional commits, tags, publishes, and writes the version bump with [skip ci].
    - The publish target matches the repo artifact type.
    - Existing working release plumbing is preserved unless evidence shows it conflicts with the target shape.

    Constraints:
    - Use this for packages, libraries, CLIs, marketplace actions, and registry publishing, not deployed running apps.
    - Do not add a second active release path unless the repo already requires one and the reason is documented.
    - Do not weaken verify or bypass it with manual release paths.

    Output: no conversational opener. Use bullet labels only: files changed, publish target, evidence, risks, remaining setup, and next. Summarize passing validation by intent/result instead of printing full command strings; include full commands only for failures, reproduction, or when asked.

    Stop rules: block when the release branch, registry target, or required publish credentials cannot be confirmed safely.
