interface:
  display_name: "Agent-Readiness"
  short_description: "Audit, build, and improve a repo's readiness for autonomous agent work"
  default_prompt: |
    Use $agent-readiness.

    Goal: make the repo verifiable by agents with the smallest useful readiness improvement.

    Success criteria:
    - Current boot, smoke, test, observability, and isolation gaps are identified from repo evidence.
    - Missing readiness layers are added or improved only when they are needed for reliable verification.
    - The repo has a clear next verification path.

    Constraints:
    - Do not review an existing diff for ship readiness; use $review for that.
    - Do not validate your own product change; use $verify for that.
    - Do not turn documentation-only cleanup into readiness work; use $docs.

    Output: no conversational opener. Use bullet labels only: grade, evidence, files changed, remaining gaps, and next. Summarize passing checks by intent/result instead of printing full command strings; include full commands only for failures, reproduction, or when asked.

    Stop rules: stop and report blocked when the repo cannot be booted or required infrastructure facts cannot be verified.
