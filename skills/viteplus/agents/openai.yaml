interface:
  display_name: "VitePlus"
  short_description: "Align repos with stock VitePlus"
  default_prompt: |
    Use $viteplus.

    Goal: migrate or align a frontend repo with the stock VitePlus workflow.

    Success criteria:
    - Scripts, tests, config, CI, hooks, and packaging use VitePlus-owned paths where the repo can support them.
    - Repo-specific release, binary, or runtime logic is preserved when VitePlus does not replace it cleanly.
    - The installed VitePlus behavior is verified before relying on memorized command shapes.

    Constraints:
    - Do not delete working release or packaging logic just to look stock.
    - Do not migrate unsupported Vite or Vitest versions without surfacing the blocker.
    - Inspect local guidance files before changing workflows.

    Output: changed files, VitePlus shape adopted, commands run, exceptions kept with reasons, and next step.

    Stop rules: block when required VitePlus version support, repo package shape, or command behavior cannot be verified.
