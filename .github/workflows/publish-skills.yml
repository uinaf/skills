name: Publish Skills

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Tessl
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Publish changed tiles
        uses: uinaf/tessl-publish-action@3fdcf60b9bd493ce598d18bf3c5ff719dfae3ce1
        with:
          review-threshold: "90"
